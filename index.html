
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrapper {
  min-height: 520px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: var(--color-background-tertiary);
}
.card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 2.5rem 2rem;
  width: 100%;
  max-width: 380px;
}
.logo {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: #042C53;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.5rem;
}
.logo i { font-size: 20px; color: #B5D4F4; }
h1 {
  font-size: 20px;
  font-weight: 500;
  color: var(--color-text-primary);
  margin-bottom: 4px;
}
.subtitle {
  font-size: 14px;
  color: var(--color-text-secondary);
  margin-bottom: 2rem;
}
.field { margin-bottom: 1rem; }
label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-secondary);
  margin-bottom: 6px;
}
.input-wrap { position: relative; }
.input-wrap i {
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  color: var(--color-text-tertiary);
  pointer-events: none;
}
input[type="email"],
input[type="password"] {
  width: 100%;
  padding: 0 12px 0 36px;
  height: 38px;
  font-size: 14px;
}
.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
  margin-top: 0.5rem;
}
.check-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--color-text-secondary);
  cursor: pointer;
}
.check-label input { accent-color: #185FA5; }
.forgot {
  font-size: 13px;
  color: #185FA5;
  text-decoration: none;
  cursor: pointer;
}
.forgot:hover { text-decoration: underline; }
.btn-primary {
  width: 100%;
  height: 40px;
  background: #042C53;
  color: #B5D4F4;
  border: none;
  border-radius: var(--border-radius-md);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-primary:hover { opacity: 0.88; }
.btn-primary:active { transform: scale(0.98); }
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 1.25rem 0;
}
.divider hr {
  flex: 1;
  border: none;
  border-top: 0.5px solid var(--color-border-tertiary);
}
.divider span {
  font-size: 12px;
  color: var(--color-text-tertiary);
}
.btn-social {
  width: 100%;
  height: 38px;
  background: transparent;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  font-size: 13px;
  color: var(--color-text-primary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-bottom: 0.5rem;
  transition: background 0.12s;
}
.btn-social:hover { background: var(--color-background-secondary); }
.sign-up {
  text-align: center;
  font-size: 13px;
  color: var(--color-text-secondary);
  margin-top: 1.5rem;
}
.sign-up a { color: #185FA5; text-decoration: none; cursor: pointer; }
.sign-up a:hover { text-decoration: underline; }
</style>

<div class="wrapper">
  <div class="card">
    <div class="logo"><i class="ti ti-bolt" aria-hidden="true"></i></div>
    <h1>Bem-vindo de volta</h1>
    <p class="subtitle">Faça login para continuar</p>

    <div class="field">
      <label for="email">E-mail</label>
      <div class="input-wrap">
        <i class="ti ti-mail" aria-hidden="true"></i>
        <input type="email" id="email" placeholder="seu@email.com" />
      </div>
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <div class="input-wrap">
        <i class="ti ti-lock" aria-hidden="true"></i>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
    </div>

    <div class="row">
      <label class="check-label">
        <input type="checkbox" /> Lembrar de mim
      </label>
      <a class="forgot">Esqueci a senha</a>
    </div>

    <button class="btn-primary" onclick="handleLogin()">
      <i class="ti ti-arrow-right" aria-hidden="true"></i> Entrar
    </button>

    <div class="divider">
      <hr /><span>ou continue com</span><hr />
    </div>

    <button class="btn-social">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Entrar com Google
    </button>

    <p class="sign-up">Não tem conta? <a onclick="sendPrompt('Como criar uma conta?')">Cadastre-se</a></p>
  </div>
</div>

<script>
function handleLogin() {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  if (!email || !pass) {
    sendPrompt('O login falhou porque os campos estão vazios. O que devo fazer?');
    return;
  }
  sendPrompt('Login realizado com sucesso! O que posso fazer agora?');
}
</script>
